<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkEase - Car Parking Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f0f0f0; }
        header { background-color: #007bff; color: white; text-align: center; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .slots { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; padding: 2rem; }
        .slot { background: white; padding: 1rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; }
        .available { border: 2px solid green; }
        .occupied { border: 2px solid red; background-color: #ffe6e6; }
        button { background-color: #28a745; color: white; border: none; padding: 0.5rem; cursor: pointer; margin-top: 0.5rem; }
        .book-form { margin: 2rem; padding: 1rem; background: white; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: none; }
        .login-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 8px; width: 300px; }
        footer { background-color: #333; color: white; text-align: center; padding: 1rem; position: fixed; bottom: 0; width: 100%; }
    </style>
    <!-- Firebase SDK for Auth -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js"></script>
    <!-- Stripe SDK for Payments -->
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body>
    <header>
        <h1>ParkEase Parking</h1>
        <button id="loginBtn">Login</button>
    </header>
    
    <section class="slots" id="slots">
        <!-- Slots will be loaded dynamically -->
    </section>
    
    <section class="book-form" id="bookForm">
        <h2>Book a Spot</h2>
        <form id="bookingForm">
            <label for="name">Name:</label>
            <input type="text" id="name" required><br><br>
            <label for="vehicle">Vehicle Number:</label>
            <input type="text" id="vehicle" required><br><br>
            <label for="duration">Duration (hours):</label>
            <input type="number" id="duration" min="1" required><br><br>
            <button type="submit">Confirm Booking & Pay</button>
        </form>
    </section>
    
    <!-- Login Modal -->
    <div class="login-modal" id="loginModal">
        <div class="modal-content">
            <h2>Login / Signup</h2>
            <input type="email" id="email" placeholder="Email" required><br><br>
            <input type="password" id="password" placeholder="Password" required><br><br>
            <button id="loginSubmit">Login</button>
            <button id="signupSubmit">Signup</button>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <footer>
        <p>&copy; 2023 ParkEase. All rights reserved.</p>
    </footer>
    
    <script>
        // Firebase Config (Replace with your Firebase project config)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        
        // Stripe Setup (Replace with your Stripe publishable key)
        const stripe = Stripe('YOUR_STRIPE_PUBLISHABLE_KEY');
        
        // Login Modal
        document.getElementById('loginBtn').addEventListener('click', () => {
            document.getElementById('loginModal').style.display = 'flex';
        });
        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
        }
        
        // Auth Handlers
        document.getElementById('loginSubmit').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(email, password).then(() => {
                alert('Logged in!');
                closeModal();
            }).catch(err => alert(err.message));
        });
        document.getElementById('signupSubmit').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            auth.createUserWithEmailAndPassword(email, password).then(() => {
                alert('Signed up!');
                closeModal();
            }).catch(err => alert(err.message));
        });
        
        // Load Dynamic Slots from Mock API
        async function loadSlots() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts'); // Mock API (replace with real endpoint)
                const data = await response.json();
                const slotsContainer = document.getElementById('slots');
                slotsContainer.innerHTML = ''; // Clear existing
                data.slice(0, 4).forEach((item, index) => { // Limit to 4 slots for demo
                    const status = Math.random() > 0.5 ? 'available' : 'occupied';
                    const slot = document.createElement('div');
                    slot.className = `slot ${status}`;
                    slot.innerHTML = `
                        <h3>Slot ${index + 1}</h3>
                        <p>${status === 'available' ? 'Available' : 'Occupied'}</p>
                        ${status === 'available' ? `<button onclick="bookSlot(${index + 1})">Book Now</button>` : ''}
                    `;
                    slotsContainer.appendChild(slot);
                });
            } catch (err) {
                console.error('Error loading slots:', err);
            }
        }
        loadSlots(); // Load on page load
        
        // Book Slot Function
        function bookSlot(id) {
            document.getElementById('bookForm').style.display = 'block';
            // Store slot ID for booking (extend as needed)
        }
        
        // Booking & Payment
        document.getElementById('bookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // Simulate payment with Stripe (replace with real checkout)
            const { error } = await stripe.redirectToCheckout({
                lineItems: [{ price: 'price_YOUR_PRICE_ID', quantity: 1 }], // Replace with your Stripe price ID
                mode: 'payment',
                successUrl: window.location.origin + '/success.html',
                cancelUrl: window.location.origin + '/cancel.html',
            });
            if (error) alert(error.message);
        });
    </script>
</body>
</html>
